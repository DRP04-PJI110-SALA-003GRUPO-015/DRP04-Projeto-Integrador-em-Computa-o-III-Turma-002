    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
</head>

<body>
    <header id="cabecalho">
        <div id="logo">
            <img src="img/Logotipo Clínica Médica Azul e Laranja .png" alt="logotipo inicial">
            <h1 id="logo1">Agenda de Atendimentos</h1>
        </div>
        <nav>
            <ul id="main">
                <li>
                    <a href="index.html" id="decoration">
                        <i class="fas fa-home"></i> Home
                        <div class="tooltip">Página inicial da clínica</div>
                    </a>
                </li>
                <li>
                    <a href="/index1.html" id="decoration">
                        <i class="fas fa-info-circle"></i> Conheça-nos
                        <div class="tooltip">Saiba mais sobre nossa clínica</div>
                    </a>
                </li>
                <li>
                    <a href="cadastro.html" id="decoration">
                        <i class="fas fa-user-plus"></i> Cadastrar
                        <div class="tooltip">Crie sua conta agora</div>
                    </a>
                </li>
                <li>
                    <a href="login.html" id="decoration">
                        <i class="fas fa-sign-in-alt"></i> Login
                        <div class="tooltip_login">Acesse sua conta</div>
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <h1 id="Form">Formulário de cadastro de profissionais:</h1>
    <form class="row g-3" action="usuario.php" method="post" enctype="multipart/form-data">
        <div class="col-md-4">
          <label for="validationDefault01" class="form-label">Nome</label>
          <input type="text" class="form-control" id="validationDefault01" name="validationDefault01" placeholder="Nome" required>
        </div>
        <div class="col-md-4">
          <label for="validationDefault02" class="form-label">Sobrenome</label>
          <input type="text" class="form-control" id="validationDefault02" name="validationDefault02"placeholder="Sobrenome" required>
        </div>
        <div class="col-md-4">
          <label for="validationDefaultUsername" class="form-label">E-mail</label>
          <div class="input-group">
            <span class="input-group-text" id="inputGroupPrepend2">@</span>
            <input type="email" class="form-control" id="validationDefaultUsername" placeholder="modelo@provedor.com" name="validationDefaultUsername" aria-describedby="inputGroupPrepend2" required>
          </div>
        </div>
        <div class="col-md-4">
          <label for="validationDefault03" class="form-label">Data de Nascimento</label>
          <input type="date" class="form-control" id="validationDefault03" name="validationDefault03" required>
        </div>
        <div class="col-md-4">
            <label for="validationDefault04" class="form-label">Especialidade na área da saúde</label>
            <input type="text" class="form-control" id="validationDefault04" name="validationDefault04" required>
        </div>
        <div class="col-md-4">
          <label for="validationDefault05" class="form-label">Gênero</label>
          <select class="form-select" id="validationDefault05" name="validationDefault05" required>
            <option selected disabled value="">Escolha...</option>
            <option>Mulher</option>
            <option>Homem</option>
            <option>Prefiro não informar</option>
          </select>
        </div>
        <div class="col-md-4">
          <label for="validationDefault06" class="form-label">Cidade</label>
          <input type="text" class="form-control" id="validationDefault06" name="validationDefault06" required>
        </div>
        <div class="col-md-4">
          <label for="validationDefault07" class="form-label">Estado</label>
          <input type="text" class="form-control" id="validationDefault07" name="validationDefault07" required>
        </div>
        <div class="col-md-4">
            <label for="validationDefaultImage" class="form-label">Carregar Imagem</label>
            <input type="file" class="form-control" id="validationDefaultImage" name="validationDefaultImage" aria-describedby="inputGroupPrepend2">
        </div>
        <div class="col-12">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="invalidCheck2" required>
            <label class="form-check-label" for="invalidCheck2">
              Concordo com os termos e condições
            </label>
          </div>
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-dark">Enviar Cadastro</button>
        </div>
      </form>
</body>
</html>
