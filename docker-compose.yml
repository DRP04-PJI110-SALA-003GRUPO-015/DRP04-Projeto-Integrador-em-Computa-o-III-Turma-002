version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinica_app
    restart: unless-stopped
    working_dir: /var/www/
    volumes:
      - ./:/var/www
    networks:
      - clinica_network

  db:
    image: mysql:8.0
    container_name: clinica_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: clinica_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: clinica
      MYSQL_USER: clinica
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - clinica_network

  nginx:
    image: nginx:alpine
    container_name: clinica_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/conf.d:/etc/nginx/conf.d/
    networks:
      - clinica_network

  redis:
    image: redis:alpine
    container_name: clinica_redis
    restart: unless-stopped
    networks:
      - clinica_network

networks:
  clinica_network:
    driver: bridge

volumes:
  dbdata:
    driver: local 