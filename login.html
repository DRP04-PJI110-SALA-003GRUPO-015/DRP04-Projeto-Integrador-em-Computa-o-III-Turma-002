<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Agenda Online - Agende suas consultas médicas de forma rápida e eficiente">
    <title>Login - Agenda Online</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
        }

        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 90px);
            background-color: rgb(69, 168, 214);
            animation: background-animation 8s infinite alternate;
            padding: 20px;
            box-sizing: border-box;
        }

        @keyframes background-animation {
            0% {
                background-color: rgb(69, 168, 214);
            }
            100% {
                background-color: rgb(69, 168, 214);
            }
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        .login-box {
            background-color: #fff;
            padding: 30px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            transform: scale(0.95);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .login-box:hover {
            transform: scale(1);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
            font-size: 28px;
            animation: fade-in 1.2s ease-out;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-group {
            margin-bottom: 15px;
            position: relative;
            animation: slide-in 1.5s ease-out;
        }

        @keyframes slide-in {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .login-box label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }

        .login-box input[type="text"],
        .login-box input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        .login-box input[type="text"]:focus,
        .login-box input[type="password"]:focus {
            border-color: #007bff;
            outline: none;
        }

        .login-button {
            width: 100%;
            padding: 10px;
            background-color: rgb(69, 168, 214);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .login-button:hover {
            background-color: #7edff0;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 500px) {
            .login-box {
                padding: 20px;
            }

            h2 {
                font-size: 24px;
            }

            .login-button {
                padding: 12px;
                font-size: 18px;
            }
        }
    </style>
</head>

<body>
    <header id="cabecalho">
        <div id="logo">
            <img src="img/Logotipo Clínica Médica Azul e Laranja .png" alt="logotipo inicial">
            <h1 id="logo1">Agenda de Atendimentos</h1>
        </div>
        <nav>
            <ul id="main">
                <li>
                    <a href="index.html" id="decoration">
                        <i class="fas fa-home"></i> Home
                        <div class="tooltip">Página inicial da clínica</div>
                    </a>
                </li>
                <li>
                    <a href="/index1.html" id="decoration">
                        <i class="fas fa-info-circle"></i> Conheça-nos
                        <div class="tooltip">Saiba mais sobre nossa clínica</div>
                    </a>
                </li>
                <li>
                    <a href="cadastro.html" id="decoration">
                        <i class="fas fa-user-plus"></i> Cadastrar
                        <div class="tooltip">Crie sua conta agora</div>
                    </a>
                </li>
                <li>
                    <a href="login.html" id="decoration">
                        <i class="fas fa-sign-in-alt"></i> Login
                        <div class="tooltip_login">Acesse sua conta</div>
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-box">
                <h2>Login</h2>
                <form>
                    <div class="input-group">
                        <label for="username">Usuário</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit" class="login-button">Entrar</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
